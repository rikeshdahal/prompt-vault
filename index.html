<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c5cfc;
    --accent2: #fc5cf3;
    --accent3: #5cf0fc;
    --text: #e8e8f0;
    --text-dim: #7a7a9a;
    --green: #4ade80;
    --orange: #fb923c;
    --red: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,92,252,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,92,252,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.15;
  }
  .orb1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; }
  .orb2 { width: 300px; height: 300px; background: var(--accent2); bottom: 0; right: -80px; }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(12px);
    background: rgba(10,10,15,0.7);
    position: sticky;
    top: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo span { color: var(--accent); }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s;
    text-decoration: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,92,252,0.4); }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  .btn-danger {
    background: rgba(248,113,113,0.1);
    color: var(--red);
    border: 1px solid rgba(248,113,113,0.2);
  }
  .btn-danger:hover { background: rgba(248,113,113,0.2); }

  .btn-sm { padding: 6px 12px; font-size: 0.78rem; }

  /* Main layout */
  main {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 220px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px 10px 38px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-dim); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
  }

  .filter-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .chip {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover, .chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,92,252,0.1);
  }
  .chip.active { background: rgba(124,92,252,0.15); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    padding: 14px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-size: 1.1rem; font-weight: 800; color: var(--text); }
  .stat-lbl { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }

  /* Cards grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: all 0.25s;
    display: flex;
    flex-direction: column;
    animation: cardIn 0.3s ease forwards;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,92,252,0.15); }

  .card-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    background: var(--surface2);
    display: block;
  }

  .card-img-placeholder {
    width: 100%;
    height: 0;
    display: none;
  }

  .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 10px; }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }

  .card-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  .type-badge {
    flex-shrink: 0;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-image { background: rgba(92,240,252,0.15); color: var(--accent3); border: 1px solid rgba(92,240,252,0.2); }
  .badge-video { background: rgba(252,92,243,0.15); color: var(--accent2); border: 1px solid rgba(252,92,243,0.2); }
  .badge-text { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
  .badge-other { background: rgba(251,146,60,0.15); color: var(--orange); border: 1px solid rgba(251,146,60,0.2); }

  .card-prompt {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-dim);
    line-height: 1.6;
    max-height: 80px;
    overflow: hidden;
    position: relative;
  }
  .card-prompt::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 30px;
    background: linear-gradient(transparent, var(--surface));
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }

  .card-date { font-size: 0.72rem; color: var(--text-dim); }

  .card-actions { display: flex; gap: 6px; }

  .icon-btn {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all 0.2s;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  .icon-btn.copied { background: rgba(74,222,128,0.15); color: var(--green); border-color: var(--green); }
  .icon-btn.delete:hover { background: rgba(248,113,113,0.1); color: var(--red); border-color: var(--red); }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; }
  .empty-state h3 { font-size: 1.2rem; color: var(--text); margin-bottom: 8px; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h2 { font-size: 1.1rem; font-weight: 800; }

  .close-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .close-btn:hover { background: var(--surface2); color: var(--text); }

  .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 18px; }

  .form-group { display: flex; flex-direction: column; gap: 8px; }

  .form-label {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .optional-tag {
    font-size: 0.68rem;
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 4px;
    color: var(--text-dim);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }

  .form-input, .form-textarea, .form-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--text-dim); }
  .form-textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
  .form-select option { background: var(--surface2); }

  /* Type selector */
  .type-selector {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .type-option input { display: none; }
  .type-option label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-dim);
    transition: all 0.2s;
    text-align: center;
  }
  .type-option label .emoji { font-size: 1.3rem; }
  .type-option input:checked + label {
    border-color: var(--accent);
    background: rgba(124,92,252,0.15);
    color: var(--accent);
  }

  /* Image upload area */
  .img-upload-area {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .img-upload-area:hover { border-color: var(--accent); background: rgba(124,92,252,0.05); }
  .img-upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .img-upload-area .upload-text { font-size: 0.82rem; color: var(--text-dim); }
  .img-upload-area .upload-icon { font-size: 2rem; margin-bottom: 8px; }

  .img-preview-wrap {
    position: relative;
    display: inline-block;
  }
  .img-preview {
    max-width: 100%;
    max-height: 180px;
    border-radius: 8px;
    display: block;
    margin: 0 auto;
  }
  .img-remove-btn {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--red);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* View Modal */
  .view-modal-prompt {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    z-index: 9999;
    transition: transform 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    header { padding: 16px; }
    .logo { font-size: 1rem; }
    main { padding: 20px 16px; }
    .cards-grid { grid-template-columns: 1fr; }
    .type-selector { grid-template-columns: repeat(2, 1fr); }
    .stats-bar { gap: 16px; }
  }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<header>
  <div class="logo">
    <div class="logo-icon">✦</div>
    Prompt<span>Vault</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openAddModal()">
      ＋ New Prompt
    </button>
  </div>
</header>

<main>
  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search prompts..." oninput="renderCards()">
    </div>
    <div class="filter-chips">
      <div class="chip active" data-filter="all" onclick="setFilter('all', this)">All</div>
      <div class="chip" data-filter="image" onclick="setFilter('image', this)">🖼 Image</div>
      <div class="chip" data-filter="video" onclick="setFilter('video', this)">🎬 Video</div>
      <div class="chip" data-filter="text" onclick="setFilter('text', this)">✍️ Text</div>
      <div class="chip" data-filter="other" onclick="setFilter('other', this)">📦 Other</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-val" id="statTotal">0</span>
      <span class="stat-lbl">Total</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="statImage">0</span>
      <span class="stat-lbl">Image</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="statVideo">0</span>
      <span class="stat-lbl">Video</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="statText">0</span>
      <span class="stat-lbl">Text</span>
    </div>
  </div>

  <!-- Cards -->
  <div class="cards-grid" id="cardsGrid"></div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">New Prompt</h2>
      <button class="close-btn" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body">
      <!-- Type -->
      <div class="form-group">
        <label class="form-label">Type</label>
        <div class="type-selector">
          <div class="type-option">
            <input type="radio" name="promptType" id="typeImage" value="image" checked>
            <label for="typeImage"><span class="emoji">🖼</span>Image</label>
          </div>
          <div class="type-option">
            <input type="radio" name="promptType" id="typeVideo" value="video">
            <label for="typeVideo"><span class="emoji">🎬</span>Video</label>
          </div>
          <div class="type-option">
            <input type="radio" name="promptType" id="typeText" value="text">
            <label for="typeText"><span class="emoji">✍️</span>Text</label>
          </div>
          <div class="type-option">
            <input type="radio" name="promptType" id="typeOther" value="other">
            <label for="typeOther"><span class="emoji">📦</span>Other</label>
          </div>
        </div>
      </div>

      <!-- Title -->
      <div class="form-group">
        <label class="form-label" for="promptTitle">Title</label>
        <input type="text" class="form-input" id="promptTitle" placeholder="e.g. Cinematic sunset scene">
      </div>

      <!-- Prompt -->
      <div class="form-group">
        <label class="form-label" for="promptText">Prompt</label>
        <textarea class="form-textarea" id="promptText" placeholder="Paste or write your prompt here..."></textarea>
      </div>

      <!-- Image (optional) -->
      <div class="form-group">
        <label class="form-label">Reference Image <span class="optional-tag">optional</span></label>
        <div class="img-upload-area" id="uploadArea" onclick="triggerUpload()">
          <div id="uploadDefault">
            <div class="upload-icon">🖼</div>
            <div class="upload-text">Click to upload or drag & drop<br><small style="opacity:0.5">PNG, JPG, WEBP up to 5MB</small></div>
          </div>
          <div id="uploadPreview" style="display:none">
            <div class="img-preview-wrap">
              <img id="previewImg" class="img-preview" src="" alt="">
              <button class="img-remove-btn" onclick="removeImg(event)">✕</button>
            </div>
          </div>
          <input type="file" id="imgInput" accept="image/*" onchange="handleImgUpload(event)" style="display:none">
        </div>
      </div>

      <!-- Notes -->
      <div class="form-group">
        <label class="form-label" for="promptNotes">Notes <span class="optional-tag">optional</span></label>
        <input type="text" class="form-input" id="promptNotes" placeholder="e.g. Works great with Midjourney v6">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePrompt()">Save Prompt</button>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="modal-overlay" id="viewModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="viewTitle">Prompt Details</h2>
      <button class="close-btn" onclick="closeViewModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="viewImgWrap" style="display:none">
        <img id="viewImg" src="" alt="" style="max-width:100%;border-radius:10px;max-height:260px;object-fit:cover;width:100%">
      </div>
      <div class="form-group">
        <div class="form-label">Prompt</div>
        <div class="view-modal-prompt" id="viewPromptText"></div>
      </div>
      <div id="viewNotesWrap" style="display:none">
        <div class="form-group">
          <div class="form-label">Notes</div>
          <div style="font-size:0.85rem;color:var(--text-dim)" id="viewNotes"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="viewEditBtn" onclick="">Edit</button>
      <button class="btn btn-primary" onclick="copyFromView()">📋 Copy Prompt</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">✓ Copied!</div>

<script>
  let prompts = JSON.parse(localStorage.getItem('promptVault') || '[]');
  let currentFilter = 'all';
  let editingId = null;
  let viewingId = null;

  function save() {
    localStorage.setItem('promptVault', JSON.stringify(prompts));
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function formatDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderCards();
  }

  function getFiltered() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    return prompts.filter(p => {
      const matchFilter = currentFilter === 'all' || p.type === currentFilter;
      const matchSearch = !q || p.title.toLowerCase().includes(q) || p.prompt.toLowerCase().includes(q) || (p.notes||'').toLowerCase().includes(q);
      return matchFilter && matchSearch;
    });
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = prompts.length;
    document.getElementById('statImage').textContent = prompts.filter(p=>p.type==='image').length;
    document.getElementById('statVideo').textContent = prompts.filter(p=>p.type==='video').length;
    document.getElementById('statText').textContent = prompts.filter(p=>p.type==='text').length;
  }

  function renderCards() {
    const grid = document.getElementById('cardsGrid');
    const filtered = getFiltered();
    updateStats();

    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state">
        <div class="empty-icon">✦</div>
        <h3>${prompts.length ? 'No matching prompts' : 'Your vault is empty'}</h3>
        <p style="margin-top:8px;font-size:0.85rem">${prompts.length ? 'Try a different search or filter.' : 'Click "New Prompt" to get started.'}</p>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map(p => {
      const badgeClass = `badge-${p.type}`;
      const typeLabel = { image:'Image', video:'Video', text:'Text', other:'Other' }[p.type];
      const typeEmoji = { image:'🖼', video:'🎬', text:'✍️', other:'📦' }[p.type];

      return `
        <div class="card" id="card-${p.id}">
          ${p.image ? `<img class="card-img" src="${p.image}" alt="">` : ''}
          <div class="card-body">
            <div class="card-header">
              <div class="card-title">${escHtml(p.title)}</div>
              <span class="type-badge ${badgeClass}">${typeEmoji} ${typeLabel}</span>
            </div>
            <div class="card-prompt">${escHtml(p.prompt)}</div>
            ${p.notes ? `<div style="font-size:0.75rem;color:var(--text-dim);font-style:italic">📝 ${escHtml(p.notes)}</div>` : ''}
            <div class="card-footer">
              <span class="card-date">${formatDate(p.created)}</span>
              <div class="card-actions">
                <button class="icon-btn" title="View" onclick="openView('${p.id}')">👁</button>
                <button class="icon-btn" title="Copy prompt" onclick="copyPrompt('${p.id}', this)">📋</button>
                <button class="icon-btn" title="Edit" onclick="openEdit('${p.id}')">✏️</button>
                <button class="icon-btn delete" title="Delete" onclick="deletePrompt('${p.id}')">🗑</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // --- Add/Edit Modal ---
  let imgDataUrl = null;

  function openAddModal() {
    editingId = null;
    imgDataUrl = null;
    document.getElementById('modalTitle').textContent = 'New Prompt';
    document.getElementById('promptTitle').value = '';
    document.getElementById('promptText').value = '';
    document.getElementById('promptNotes').value = '';
    document.querySelector('input[name="promptType"][value="image"]').checked = true;
    resetImgUpload();
    document.getElementById('addModal').classList.add('open');
  }

  function openEdit(id) {
    const p = prompts.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    imgDataUrl = p.image || null;
    document.getElementById('modalTitle').textContent = 'Edit Prompt';
    document.getElementById('promptTitle').value = p.title;
    document.getElementById('promptText').value = p.prompt;
    document.getElementById('promptNotes').value = p.notes || '';
    document.querySelector(`input[name="promptType"][value="${p.type}"]`).checked = true;
    if (p.image) {
      document.getElementById('uploadDefault').style.display = 'none';
      document.getElementById('uploadPreview').style.display = 'block';
      document.getElementById('previewImg').src = p.image;
    } else {
      resetImgUpload();
    }
    document.getElementById('addModal').classList.add('open');
    document.getElementById('viewModal').classList.remove('open');
  }

  function closeAddModal() {
    document.getElementById('addModal').classList.remove('open');
    editingId = null;
    imgDataUrl = null;
  }

  function savePrompt() {
    const title = document.getElementById('promptTitle').value.trim();
    const prompt = document.getElementById('promptText').value.trim();
    const notes = document.getElementById('promptNotes').value.trim();
    const type = document.querySelector('input[name="promptType"]:checked').value;

    if (!title) { alert('Please add a title!'); return; }
    if (!prompt) { alert('Please add a prompt!'); return; }

    if (editingId) {
      const idx = prompts.findIndex(p => p.id === editingId);
      if (idx !== -1) {
        prompts[idx] = { ...prompts[idx], title, prompt, notes, type, image: imgDataUrl || null };
      }
    } else {
      prompts.unshift({ id: genId(), title, prompt, notes, type, image: imgDataUrl || null, created: Date.now() });
    }

    save();
    renderCards();
    closeAddModal();
    showToast('✓ Prompt saved!');
  }

  function deletePrompt(id) {
    if (!confirm('Delete this prompt?')) return;
    prompts = prompts.filter(p => p.id !== id);
    save();
    renderCards();
  }

  // --- Image upload ---
  function triggerUpload() {
    if (!document.getElementById('uploadPreview').style.display || document.getElementById('uploadPreview').style.display === 'none') {
      document.getElementById('imgInput').click();
    }
  }

  function handleImgUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { alert('Image must be under 5MB'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      imgDataUrl = ev.target.result;
      document.getElementById('previewImg').src = imgDataUrl;
      document.getElementById('uploadDefault').style.display = 'none';
      document.getElementById('uploadPreview').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  function removeImg(e) {
    e.stopPropagation();
    imgDataUrl = null;
    resetImgUpload();
    document.getElementById('imgInput').value = '';
  }

  function resetImgUpload() {
    document.getElementById('uploadDefault').style.display = 'block';
    document.getElementById('uploadPreview').style.display = 'none';
    document.getElementById('previewImg').src = '';
  }

  // --- Copy ---
  function copyPrompt(id, btn) {
    const p = prompts.find(x => x.id === id);
    if (!p) return;
    navigator.clipboard.writeText(p.prompt).then(() => {
      if (btn) { btn.classList.add('copied'); setTimeout(() => btn.classList.remove('copied'), 1500); }
      showToast('📋 Copied to clipboard!');
    });
  }

  function copyFromView() {
    if (viewingId) copyPrompt(viewingId, null);
  }

  // --- View Modal ---
  function openView(id) {
    const p = prompts.find(x => x.id === id);
    if (!p) return;
    viewingId = id;
    document.getElementById('viewTitle').textContent = p.title;
    document.getElementById('viewPromptText').textContent = p.prompt;

    if (p.image) {
      document.getElementById('viewImg').src = p.image;
      document.getElementById('viewImgWrap').style.display = 'block';
    } else {
      document.getElementById('viewImgWrap').style.display = 'none';
    }

    if (p.notes) {
      document.getElementById('viewNotes').textContent = p.notes;
      document.getElementById('viewNotesWrap').style.display = 'block';
    } else {
      document.getElementById('viewNotesWrap').style.display = 'none';
    }

    document.getElementById('viewEditBtn').onclick = () => openEdit(id);
    document.getElementById('viewModal').classList.add('open');
  }

  function closeViewModal() {
    document.getElementById('viewModal').classList.remove('open');
    viewingId = null;
  }

  // --- Toast ---
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // Close modals on overlay click
  document.getElementById('addModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeAddModal(); });
  document.getElementById('viewModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeViewModal(); });

  // Drag and drop for upload area
  const uploadArea = document.getElementById('uploadArea');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = 'var(--accent)'; });
  uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = ''; });
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const fakeEvent = { target: { files: [file] } };
      handleImgUpload(fakeEvent);
    }
  });

  // Add some sample prompts on first load
  if (!prompts.length) {
    prompts = [
      { id: genId(), title: 'Cinematic Mountain Sunrise', type: 'image', prompt: 'A breathtaking cinematic shot of a mountain range at sunrise, golden hour light, fog in the valleys, dramatic clouds, photorealistic, 8K, shot on IMAX camera, epic landscape photography', notes: 'Works great with Midjourney v6 and DALL-E 3', image: null, created: Date.now() - 86400000*2 },
      { id: genId(), title: 'Slow-Mo Water Splash', type: 'video', prompt: 'Ultra slow motion video of colorful paint splashing in water, macro lens, studio lighting, 4K, 240fps, vibrant colors mixing, mesmerizing swirls, cinematic color grade', notes: 'Use with Sora or Runway Gen-3', image: null, created: Date.now() - 86400000 },
      { id: genId(), title: 'Cyberpunk City Night', type: 'image', prompt: 'Neon-lit cyberpunk cityscape at night, rain-slicked streets reflecting holographic advertisements, flying vehicles in the distance, fog, dark and moody atmosphere, blade runner aesthetic, ultra detailed, artstation trending', notes: null, image: null, created: Date.now() - 3600000 },
    ];
    save();
  }

  renderCards();
</script>
</body>
</html>
